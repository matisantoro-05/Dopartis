<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dopartis – Tablas</title>
  <meta name="description" content="Resultados de fútbol en tiempo real. Ligas de Sudamérica y Europa, Champions League, Copa Libertadores y más." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/style.css" />
  
</head>
<body>

<header>
  <div class="header-inner">
    <a href="/" class="logo">DO<span>PARTIS</span></a>
    <nav class="header-nav">
      <a href="/" class="">Resultados</a>
      <a href="/tablas.html" class="active">Tablas</a>
      <a href="/estadisticas.html" class="">Estadísticas</a>
      <a href="/equipos.html" class="">Equipos</a>
      <a href="/campeones.html">Campeones</a>
    </nav>
    <div class="header-right">
      <button class="theme-toggle" onclick="toggleTheme()" title="Cambiar tema" id="theme-btn">🌙</button>
      <div class="live-indicator"><div class="live-dot"></div>EN VIVO</div>
    </div>
  </div>
</header>


<div class="ad-wrap">
  <div class="ad-slot top">Publicidad · 728×90</div>
</div>

<div class="refresh-bar">
  <span class="last-update" id="last-update">Cargando...</span>
  <button class="refresh-btn" onclick="refreshCurrentView()">↻ Actualizar</button>
</div>

<div class="main">
  <div class="content-col">
    <div id="view-standings">
      <div class="league-tabs-wrap" id="standings-league-tabs"></div>
      <div id="arg-tabs-wrap" style="display:none;" class="arg-tabs"></div>
      <div id="standings-container"><div class="loader-wrap"><div class="spinner"></div></div></div>
    </div>
  </div>

  <aside class="sidebar">
    <div id="sidebar-rounds">
      <div class="ad-slot box">Publicidad · 300×250</div>
      <div class="standings-round-nav">
        <div class="srn-header">
          <button class="srn-arrow" onclick="changeRound(-1)">&#8249;</button>
          <select class="srn-select" id="srn-select" onchange="selectRoundFromDropdown(this.value)"></select>
          <button class="srn-arrow" onclick="changeRound(1)">&#8250;</button>
        </div>
        <div id="srn-matches"><div class="loader-wrap" style="padding:20px;"><div class="spinner"></div></div></div>
      </div>
    </div>
  </aside>
</div>

<!-- Modal de partido -->
<div class="modal-overlay" id="match-modal" onclick="closeModalOnOverlay(event)">
  <div class="modal-box" id="modal-box">
    <div id="modal-content">
      <div class="modal-loader"><div class="spinner"></div><span>Cargando...</span></div>
    </div>
  </div>
</div>

<footer>
  <div class="footer-logo">DO<span>PARTIS</span></div>
  <p>Resultados y estadísticas de fútbol en tiempo real</p>
  <div><a href="/">Inicio</a><a href="#">Ligas</a><a href="#">Contacto</a><a href="#">Privacidad</a></div>
  <p style="margin-top:14px;font-size:14px;">© 2026 Dopartis. Todos los derechos reservados.</p>
</footer>

<script src="js/shared.js"></script>
<script src="js/partido.js"></script>
<script src="js/tablas.js"></script>
</body>
</html>
